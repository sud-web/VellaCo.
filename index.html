<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Review Site</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: white;
  color: black;
  margin: 0;
  padding: 0;
}
header {
  text-align: center;
  padding: 20px;
  border-bottom: 2px solid black;
}
.movie-card {
  width: 300px;
  margin: 30px auto;
  border: 1px solid black;
  padding: 15px;
  text-align: center;
}
.movie-card img {
  width: 100%;
}
button {
  background: black;
  color: white;
  padding: 10px 20px;
  border: none;
  cursor: pointer;
}
</style>
</head>
<body>
<header>
<h1>My Movie Reviews</h1>
<p>Honest Reviews of Latest Movies</p>
</header>
<div class="movie-card">
<img src="images/movie1.jpg" alt="Movie Poster">
<h2>Movie Name</h2>
<p>Rating: ⭐⭐⭐⭐☆</p>
<p>This movie has amazing action and story.</p>
<button>Read Review</button>
</div>
</body>
</html>
