<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VELLA CO.</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#fff;color:#000}
header{position:sticky;top:0;background:#fff;padding:18px 5%;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #eee;z-index:1000}
.logo{font-size:28px;font-weight:800;letter-spacing:3px}
.menu{display:flex;gap:25px}
.menu a{text-decoration:none;color:#000;font-weight:600;position:relative}
.menu a::after{content:'';position:absolute;left:0;bottom:-6px;width:50%;height:2px;background:#ddd}
.hero{padding:120px 5%;display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:center}
.hero img{width:100%;border-radius:30px;height:650px;object-fit:cover}
.hero h1{font-size:72px;margin-bottom:20px}
.hero button{padding:15px 35px;border:none;background:#000;color:#fff;border-radius:50px;cursor:pointer}
.products{padding:60px 5%;display:grid;grid-template-columns:repeat(3,1fr);gap:25px}
.card{border:1px solid #eee;border-radius:25px;overflow:hidden;transition:.3s}
.card:hover{transform:translateY(-8px)}
.card img{width:100%;height:350px;object-fit:cover}
.info{padding:20px}
.btns{display:flex;gap:10px;margin-top:15px}
.btns button{flex:1;padding:13px;border:none;border-radius:12px;cursor:pointer;font-weight:700}
.cartbtn{background:#000;color:#fff}
.orderbtn{background:#f3f3f3}
.cart{position:fixed;right:-100%;top:0;width:400px;height:100%;background:#fff;padding:25px;transition:.4s;box-shadow:-10px 0 30px rgba(0,0,0,.1);z-index:2000}
.cart.active{right:0}
.checkout{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;padding:20px;z-index:3000}
.checkout.active{display:flex}
.checkout-box{background:#fff;padding:30px;border-radius:30px;width:100%;max-width:600px;position:relative}
.checkout-box input,.checkout-box textarea,.checkout-box select{width:100%;padding:15px;margin-top:15px;border-radius:14px;border:1px solid #ddd;background:#f7f7f7}
.checkout-box button{width:100%;padding:15px;margin-top:15px;border:none;background:#000;color:#fff;border-radius:14px;font-weight:700}
footer{padding:60px 5%;background:#f7f7f7;margin-top:60px}
@media(max-width:900px){.hero{grid-template-columns:1fr}.products{grid-template-columns:1fr 1fr}}
@media(max-width:700px){.menu{position:fixed;top:75px;left:-100%;background:#fff;width:100%;height:100vh;flex-direction:column;padding:40px;transition:.3s}.menu.active{left:0}.products{grid-template-columns:1fr}.hero h1{font-size:48px}.cart{width:100%}}
</style>
</head>
<body>
<header>
<div class="logo">VELLA CO.</div>
<div class="menu" id="menu">
<a href="#">Home</a>
<a href="#shop">Shop</a>
<a href="#">Collections</a>
<a href="#contact">Contact</a>
</div>
<div style="display:flex;gap:20px;font-size:22px">
<i class="fa-solid fa-bars" id="bar"></i>
<div onclick="toggleCart()" style="cursor:pointer"><i class="fa-solid fa-bag-shopping"></i> <span id="count">0</span></div>
</div>
</header>
<section class="hero">
<div>
<h1>VELLA CO.</h1>
<p style="margin-bottom:25px;color:#666;line-height:1.7">Luxury modern streetwear collection.</p>
<button onclick="document.getElementById('shop').scrollIntoView({behavior:'smooth'})">Shop Now</button>
</div>
<img src="https://images.unsplash.com/photo-1529139574466-a303027c1d8b?q=80&w=1200&auto=format&fit=crop">
</section>
<section class="products" id="shop"></section>
<div class="cart" id="cart">
<h2>Your Cart</h2>
<div id="cartItems"></div>
<h3 style="margin-top:20px">Total: ₹<span id="total">0</span></h3>
<button onclick="openCheckout()" style="margin-top:20px;padding:15px;width:100%;background:#000;color:#fff;border:none;border-radius:14px">Checkout</button>
</div>
<div class="checkout" id="checkout">
<div class="checkout-box">
<h2>Checkout</h2>
<input type="text" placeholder="Full Name" id="name">
<input type="tel" placeholder="10 Digit Mobile Number" id="phone" maxlength="10">
<input type="email" placeholder="Email Address" id="email">
<textarea placeholder="Address" id="address"></textarea>
<select id="payment">
<option value="online">Online Payment</option>
<option value="cod">Cash On Delivery</option>
</select>
<button onclick="placeOrder()">Place Order</button>
</div>
</div>
<footer id="contact">
<h2>VELLA CO.</h2>
<p style="margin-top:10px;color:#666">Premium Fashion Brand</p>
<div style="margin-top:20px;font-size:24px;display:flex;gap:20px">
<i class="fa-brands fa-instagram"></i>
<i class="fa-brands fa-whatsapp"></i>
<i class="fa-brands fa-telegram"></i>
</div>
</footer>
<script>
const products=[
{id:1,name:'Oversized Hoodie',price:2499,img:'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?q=80&w=1200&auto=format&fit=crop'},
{id:2,name:'Premium Tee',price:1499,img:'https://images.unsplash.com/photo-1512436991641-6745cdb1723f?q=80&w=1200&auto=format&fit=crop'},
{id:3,name:'Street Jacket',price:3999,img:'https://images.unsplash.com/photo-1496747611176-843222e1e57c?q=80&w=1200&auto=format&fit=crop'},
{id:4,name:'Luxury Hoodie',price:2999,img:'https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?q=80&w=1200&auto=format&fit=crop'},
{id:5,name:'Classic Tee',price:1899,img:'https://images.unsplash.com/photo-1503341504253-dff4815485f1?q=80&w=1200&auto=format&fit=crop'},
{id:6,name:'Minimal Sweatshirt',price:2299,img:'https://images.unsplash.com/photo-1523398002811-999ca8dec234?q=80&w=1200&auto=format&fit=crop'}
];
const shop=document.querySelector('.products');
products.forEach(p=>{
shop.innerHTML+=`<div class='card'><img src='${p.img}'><div class='info'><h3>${p.name}</h3><h2>₹${p.price}</h2><div class='btns'><button class='cartbtn' onclick='addCart(${p.id})'>Add To Cart</button><button class='orderbtn' onclick='buyNow(${p.id})'>Order Now</button></div></div></div>`
});
let cart=JSON.parse(localStorage.getItem('cart'))||[];
function save(){localStorage.setItem('cart',JSON.stringify(cart))}
function addCart(id){let p=products.find(x=>x.id==id);let e=cart.find(x=>x.id==id);if(e){e.qty++}else{cart.push({...p,qty:1})}save();renderCart();toggleCart()}
function renderCart(){let items=document.getElementById('cartItems');items.innerHTML='';let total=0;let count=0;cart.forEach(i=>{total+=i.price*i.qty;count+=i.qty;items.innerHTML+=`<div style='display:flex;justify-content:space-between;margin-top:15px'><div><h4>${i.name}</h4><p>₹${i.price} x ${i.qty}</p></div><i class='fa-solid fa-trash' onclick='del(${i.id})' style='cursor:pointer'></i></div>`});document.getElementById('total').innerText=total;document.getElementById('count').innerText=count}
renderCart();
function del(id){cart=cart.filter(i=>i.id!=id);save();renderCart()}
function toggleCart(){document.getElementById('cart').classList.toggle('active')}
function openCheckout(){document.getElementById('checkout').classList.add('active')}
function buyNow(id){cart=[];addCart(id);openCheckout()}
document.getElementById('bar').onclick=()=>{document.getElementById('menu').classList.toggle('active')}
document.addEventListener('click',e=>{
if(!document.getElementById('menu').contains(e.target)&&!document.getElementById('bar').contains(e.target))document.getElementById('menu').classList.remove('active');
if(e.target.id==='checkout')document.getElementById('checkout').classList.remove('active');
});
document.getElementById('phone').addEventListener('input',function(){this.value=this.value.replace(/[^0-9]/g,'').slice(0,10)})
function placeOrder(){
let phone=document.getElementById('phone').value;
if(phone.length!=10){alert('Enter valid 10 digit mobile number');return}
let total=cart.reduce((a,b)=>a+b.price*b.qty,0)
if(document.getElementById('payment').value==='online'){
let options={key:'YOUR_RAZORPAY_KEY',amount:total*100,currency:'INR',name:'VELLA CO.',handler:function(){alert('Payment Successful')}};
new Razorpay(options).open();
}else{
window.open('https://wa.me/919999999999?text=New COD Order from VELLA CO.')
}
}
window.onpopstate=function(){history.pushState({},'')}
</script>
</body>
</html>
