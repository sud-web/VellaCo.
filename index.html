<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vella Co.</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#111;color:#fff}
header{display:flex;justify-content:space-between;align-items:center;padding:20px 40px;background:#000;position:sticky;top:0}
.logo{font-size:28px;font-weight:bold;color:#f5c542}
.hero{height:90vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;background:linear-gradient(135deg,#000,#333)}
.hero h1{font-size:60px;margin:0}
.hero p{font-size:20px;color:#ccc}
.btn{padding:15px 35px;background:#f5c542;color:#000;border:none;font-weight:bold;cursor:pointer;border-radius:30px}
.products{display:flex;flex-wrap:wrap;justify-content:center;gap:30px;padding:60px 20px}
.card{background:#1e1e1e;border-radius:20px;padding:20px;width:250px;text-align:center;box-shadow:0 10px 20px rgba(0,0,0,.5)}
.card img{width:100%;border-radius:15px}
.card h3{margin:15px 0}
footer{text-align:center;padding:20px;background:#000;color:#aaa}
</style>
</head>
<body>
<header><div class='logo'>VELLA CO.</div><nav>Premium Streetwear</nav></header>
<section class='hero'>
<h1>Wear The Vibe</h1>
<p>Luxury Streetwear Collection</p>
<button class='btn'>Shop Now</button>
</section>
<section class='products'>
<div class='card'><img src='https://via.placeholder.com/250x300'><h3>Black Oversized Tee</h3><p>₹999</p></div>
<div class='card'><img src='https://via.placeholder.com/250x300'><h3>White Minimal Tee</h3><p>₹899</p></div>
<div class='card'><img src='https://via.placeholder.com/250x300'><h3>Signature Drop</h3><p>₹1199</p></div>
</section>
<footer>© 2026 Vella Co. All Rights Reserved</footer>
</body>
</html>
