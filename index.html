<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:#f5f7fb;
color:#111;
overflow-x:hidden;
}

/* HEADER */

header{
position:sticky;
top:0;
z-index:1000;
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 18px;
background:rgba(255,255,255,0.9);
backdrop-filter:blur(12px);
border-bottom:1px solid #ececec;
}

.logo{
font-size:24px;
font-weight:700;
letter-spacing:1px;
}

.header-right{
display:flex;
gap:16px;
align-items:center;
}

.search-icon-btn,
.cart-icon-btn{
background:none;
border:none;
cursor:pointer;
position:relative;
}

.search-icon-btn svg,
.cart-icon-btn svg{
width:24px;
height:24px;
stroke:#111;
stroke-width:2.3;
fill:none;
}

.cart-count{
position:absolute;
top:-6px;
right:-8px;
background:#000;
color:#fff;
font-size:10px;
padding:3px 6px;
border-radius:50px;
font-weight:700;
}

/* SEARCH */

.search-overlay-bar{
display:none;
padding:12px 15px;
background:#fff;
}

.search-wrapper{
position:relative;
}

.search-wrapper input{
width:100%;
padding:14px 45px;
border-radius:50px;
border:none;
background:#f2f4f7;
font-size:13px;
outline:none;
}

.input-glass-icon{
position:absolute;
top:50%;
left:16px;
transform:translateY(-50%);
}

.input-glass-icon svg{
width:16px;
height:16px;
stroke:#777;
}

.clear-search{
position:absolute;
right:18px;
top:50%;
transform:translateY(-50%);
font-size:14px;
cursor:pointer;
}

/* BANNER */

.promo-banner-section{
padding:15px;
}

.banner-slider{
height:190px;
border-radius:22px;
overflow:hidden;
position:relative;
box-shadow:0 12px 35px rgba(0,0,0,0.08);
}

.slide-poster{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
padding:25px;
color:#fff;
opacity:0;
transition:0.4s;
}

.slide-poster.active{
opacity:1;
}

.bg-banner-1{
background:linear-gradient(135deg,#111,#333);
}

.bg-banner-2{
background:linear-gradient(135deg,#4f46e5,#7c3aed);
}

.bg-banner-3{
background:linear-gradient(135deg,#ec4899,#f43f5e);
}

.slide-poster h2{
font-size:24px;
font-weight:700;
margin-bottom:10px;
}

.slide-poster p{
font-size:13px;
line-height:1.6;
color:#f1f1f1;
}

/* SECTION */

.section-title{
padding:5px 18px 14px;
font-size:15px;
font-weight:700;
}

/* PRODUCTS */

.products-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
padding:0 15px 25px;
}

.product-card{
background:#fff;
border-radius:22px;
overflow:hidden;
box-shadow:0 8px 25px rgba(0,0,0,0.06);
transition:0.25s;
cursor:pointer;
display:flex;
flex-direction:column;
}

.product-card:hover{
transform:translateY(-4px);
}

.product-card img{
width:100%;
height:230px;
object-fit:cover;
background:#fff;
}

.product-info{
padding:12px;
display:flex;
flex-direction:column;
flex-grow:1;
}

.product-name{
font-size:13px;
font-weight:600;
line-height:1.5;
margin-bottom:8px;
min-height:38px;
}

.price-container{
display:flex;
align-items:center;
gap:5px;
margin-bottom:12px;
flex-wrap:wrap;
}

.current-price{
font-size:15px;
font-weight:700;
}

.old-mrp{
font-size:11px;
text-decoration:line-through;
color:#888;
}

.discount-tag{
font-size:11px;
font-weight:700;
color:#ff3f6c;
}

.view-btn{
width:100%;
padding:11px;
border:none;
border-radius:12px;
background:#111;
color:#fff;
font-size:12px;
font-weight:600;
cursor:pointer;
transition:0.2s;
}

.view-btn:hover{
opacity:0.9;
}

/* PRODUCT PAGE */

#productPage{
padding-bottom:90px;
}

.back-btn{
padding:18px;
font-size:14px;
font-weight:600;
cursor:pointer;
}

.main-product-img{
width:100%;
height:420px;
object-fit:cover;
background:#fff;
}

.details-wrapper{
padding:22px;
background:#fff;
margin-top:-25px;
border-radius:28px 28px 0 0;
position:relative;
z-index:2;
}

.details-title{
font-size:22px;
font-weight:700;
margin-bottom:10px;
}

.details-price-box{
display:flex;
align-items:center;
gap:10px;
margin-bottom:15px;
}

.details-price{
font-size:26px;
font-weight:700;
color:#111;
}

.details-mrp{
font-size:15px;
color:#888;
text-decoration:line-through;
}

.select-title{
font-size:13px;
font-weight:700;
margin-bottom:10px;
margin-top:18px;
text-transform:uppercase;
}

.option-group{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.opt-box{
padding:10px 16px;
border-radius:12px;
border:1px solid #ddd;
font-size:13px;
cursor:pointer;
background:#fff;
font-weight:600;
transition:0.2s;
}

.opt-box.selected{
background:#111;
color:#fff;
border-color:#111;
}

/* ACTION BUTTONS */

.main-actions{
display:flex;
gap:12px;
margin-top:28px;
}

.main-actions button{
flex:1;
padding:15px;
border:none;
border-radius:14px;
font-size:14px;
font-weight:700;
cursor:pointer;
}

.add-cart-btn{
background:#f1f3f5;
color:#111;
}

.buy-now-btn{
background:#111;
color:#fff;
}

/* CART */

#cartPage{
padding:18px;
}

.cart-item{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px;
background:#fff;
border-radius:18px;
margin-bottom:14px;
box-shadow:0 6px 18px rgba(0,0,0,0.05);
}

.cart-item-left{
display:flex;
gap:12px;
align-items:center;
}

.cart-item img{
width:70px;
height:70px;
object-fit:cover;
border-radius:12px;
}

.cart-item-info h4{
font-size:13px;
margin-bottom:5px;
}

.cart-item-info p{
font-size:11px;
color:#666;
}

.remove-item-btn{
background:none;
border:none;
font-size:18px;
cursor:pointer;
}

.cart-total-box{
font-size:20px;
font-weight:700;
margin-top:25px;
}

.checkout-trigger-btn{
width:100%;
padding:16px;
border:none;
border-radius:16px;
background:#111;
color:#fff;
font-size:15px;
font-weight:700;
margin-top:18px;
cursor:pointer;
}

/* MODAL */

#checkoutModal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
z-index:9999;
padding:20px;
}

.modal-content{
background:#fff;
border-radius:24px;
padding:24px;
max-width:420px;
margin:50px auto;
animation:popup 0.3s ease;
}

@keyframes popup{
from{
transform:scale(0.9);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}

.modal-content h3{
margin-bottom:18px;
font-size:20px;
}

.modal-content input,
.modal-content textarea{
width:100%;
padding:14px;
border-radius:14px;
border:none;
background:#f4f6f8;
margin-bottom:14px;
font-size:13px;
outline:none;
}

.modal-content button{
width:100%;
padding:15px;
border:none;
border-radius:14px;
background:#111;
color:#fff;
font-size:14px;
font-weight:700;
cursor:pointer;
}

/* FOOTER */

footer{
background:#fff;
padding:30px 20px;
text-align:center;
border-top:1px solid #eee;
margin-top:30px;
}

.footer-socials{
display:flex;
justify-content:center;
gap:18px;
margin-bottom:16px;
}

.footer-socials a{
width:45px;
height:45px;
display:flex;
justify-content:center;
align-items:center;
background:#111;
border-radius:50%;
text-decoration:none;
color:#fff;
font-size:18px;
transition:0.2s;
}

.footer-socials a:hover{
transform:translateY(-4px);
}

footer p{
font-size:12px;
color:#777;
line-height:1.6;
}

/* TOAST */

#customToast{
position:fixed;
top:-100px;
left:50%;
transform:translateX(-50%);
background:#111;
color:#fff;
padding:13px 24px;
border-radius:50px;
font-size:13px;
font-weight:600;
z-index:99999;
transition:0.35s;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

#customToast.show{
top:24px;
}

/* LIVE POPUP */

#liveSalesNotification{
position:fixed;
bottom:-120px;
left:15px;
background:#fff;
padding:14px 18px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.12);
transition:0.4s;
z-index:999;
max-width:300px;
display:flex;
gap:10px;
align-items:flex-start;
}

#liveSalesNotification.popup-active{
bottom:18px;
}

.sales-pulse-dot{
width:10px;
height:10px;
border-radius:50%;
background:#22c55e;
animation:pulse 1.5s infinite;
margin-top:5px;
}

.sales-content-text{
font-size:11px;
line-height:1.6;
color:#555;
}

.sales-content-text strong{
color:#111;
}

@keyframes pulse{
0%{transform:scale(0.9);}
50%{transform:scale(1.4);}
100%{transform:scale(0.9);}
}

/* RESPONSIVE */

@media(min-width:768px){

.products-grid{
grid-template-columns:repeat(4,1fr);
gap:20px;
}

.banner-slider{
height:320px;
}

.slide-poster h2{
font-size:38px;
}

.main-product-img{
height:620px;
}

}
</style>
